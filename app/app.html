<!DOCTYPE html>
<html lang="en">

<head>
    <title>Configurator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/app-styles.css">
</head>

<body>
    <div id="ui-root">

        <!-- buttons -->
        <div class="panel info">
            <div class="info-row">
                <button id="btnBack" class="icon-btn" title="Back" aria-label="Back">
                    <i data-lucide="arrow-left"></i>
                </button>

                <button id="btnToggleToolbar" class="icon-btn" title="Toggle tools" aria-label="Toggle tools">
                    <i data-lucide="move-3d"></i>
                </button>

                <button id="btnToggleParams" class="icon-btn" title="Toggle parameters" aria-label="Toggle parameters">
                    <i data-lucide="sliders-horizontal"></i>
                </button>

                <button id="btnToggleChat" class="icon-btn" title="Toggle chat" aria-label="Toggle chat">
                    <i data-lucide="message-square"></i>
                </button>

                <div id="loadingSpinner" class="loading-spinner" aria-label="Loading" data-pct="0"></div>


            </div>

        </div>

        <!-- tools -->
        <div class="panel toolbar">
            <button id="btnMove" class="active">Move</button>
            <button id="btnRotate">Rotate</button>
            <button id="btnScale">Scale</button>
        </div>

        <!-- chat -->
        <div class="panel chat" style="right: 20px; bottom: 20px; pointer-events: auto; width: 360px;">

            <div id="chatMessages" style="height: 180px; overflow-y: auto; padding: 8px; background: #8fb2c9;
           border: 1px solid rgba(0,0,0,0.12); border-radius: 12px; margin-bottom: 8px;">
            </div>

            <div style="display:flex; gap:8px; align-items:flex-end;">
                <textarea id="chatInput" placeholder="Describe what you want… (Enter to send, Shift+Enter for newline)"
                    rows="5"
                    style="flex:1; resize:none; padding:8px; border-radius:10px; border:1px solid rgba(0,0,0,0.2);"></textarea>
                <button id="chatSend"
                    style="padding:8px 12px; border-radius:10px; border:1px solid rgba(0,0,0,0.2); cursor:pointer;">
                    Send
                </button>
            </div>
        </div>


        <!-- sliders -->
        <div class="panel sliders" style="top: 120px; left: 20px; pointer-events: auto; width: 260px;">
            <div style="font-weight: 600; margin-bottom: 8px; color:black">Parameters</div>

            <!-- StartMonth -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sStartMonth" style="color:black">StartMonth</label>
                    <span id="vStartMonth" style="color:black">1</span>
                </div>
                <input id="sStartMonth" type="range" min="1" max="12" step="1" value="1" style="width:100%;">
            </div>

            <!-- StartDay -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sStartDay" style="color:black">StartDay</label>
                    <span id="vStartDay" style="color:black">1</span>
                </div>
                <input id="sStartDay" type="range" min="1" max="31" step="1" value="1" style="width:100%;">
            </div>

            <!-- StartHour -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sStartHour" style="color:black">StartHour</label>
                    <span id="vStartHour" style="color:black">1</span>
                </div>
                <input id="sStartHour" type="range" min="1" max="24" step="1" value="1" style="width:100%;">
            </div>
            
             <!-- EndtMonth -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sEndMonth" style="color:black">EndMonth</label>
                    <span id="vEndMonth" style="color:black">1</span>
                </div>
                <input id="sEndMonth" type="range" min="1" max="12" step="1" value="1" style="width:100%;">
            </div>

            <!-- EndDay -->
            <div style="margin-bottom: 10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sEndDay" style="color:black">EndDay</label>
                    <span id="vEndDay" style="color:black">1</span>
                </div>
                <input id="sEndDay" type="range" min="1" max="31" step="1" value="1" style="width:100%;">
            </div>

            <!-- EndHour -->
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label for="sEndHour" style="color:black">EndHour</label>
                    <span id="vEndHour" style="color:black">1</span>
                </div>
                <input id="sEndHour" type="range" min="1" max="24" step="1" value="1" style="width:100%;">
            </div>

        </div>


    </div>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
  }
}
</script>
    <script type="module" src="./app.js"></script>
</body>

</html>
